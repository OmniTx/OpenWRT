name: Build X-WRT for Xiaomi 4A Gigabit
on:
  workflow_dispatch:
    inputs:
      xwrt_tag:
        description: 'X-WRT source tag from github.com/x-wrt/x-wrt/tags (WITHOUT v prefix, e.g. 23.10_b202312150123)'
        required: true
        default: '23.10_b202312150123'

permissions:
  contents: write

jobs:
  build:
    name: Compile Firmware
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Before cleanup:"
          df -h .
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
            /opt/hostedtoolcache 2>/dev/null || true
          sudo docker rmi $(docker image ls -aq) 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          echo "After cleanup:"
          df -h .

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget xsltproc \
            python3-dev

      - name: Clone x-wrt source
        run: |
          TAG="${{ github.event.inputs.xwrt_tag }}"
          echo "Building X-WRT tag: ${TAG}"

          git clone https://github.com/x-wrt/x-wrt.git xwrt-source
          cd xwrt-source

          # Checkout the specified tag
          if [ "${TAG}" != "master" ]; then
            git checkout "${TAG}" 2>/dev/null || {
              echo "Tag ${TAG} not found, trying with v prefix..."
              git checkout "v${TAG}" 2>/dev/null || {
                echo "ERROR: Could not find tag ${TAG} or v${TAG}"
                echo "Available tags:"
                git tag -l | grep -i "$(echo ${TAG} | cut -d_ -f1)" | tail -20
                exit 1
              }
            }
          fi

          echo "✓ X-WRT source at: $(git describe --tags --always 2>/dev/null || git rev-parse --short HEAD)"

      - name: Update feeds
        run: |
          cd xwrt-source
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "✓ Feeds updated and installed"

      - name: Configure build
        run: |
          TAG="${{ github.event.inputs.xwrt_tag }}"
          cd xwrt-source

          # Generate config for Xiaomi Mi Router 4A Gigabit (ramips/mt7621)
          cat > .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-4a-gigabit=y

          # LuCI web interface
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y

          # PPPoE
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y

          # WireGuard VPN
          CONFIG_PACKAGE_luci-proto-wireguard=y
          CONFIG_PACKAGE_kmod-wireguard=y
          CONFIG_PACKAGE_wireguard-tools=y

          # ZeroTier
          CONFIG_PACKAGE_zerotier=y
          CONFIG_PACKAGE_luci-app-zerotier=y

          # Wake on LAN
          CONFIG_PACKAGE_luci-app-wol=y
          CONFIG_PACKAGE_etherwake=y

          # Proxy tools
          CONFIG_PACKAGE_redsocks=y
          CONFIG_PACKAGE_dns2socks=y

          # X-WRT specific apps
          CONFIG_PACKAGE_luci-app-commands=y
          CONFIG_PACKAGE_luci-app-xwan=y
          CONFIG_PACKAGE_luci-app-natflow-users=y

          # Network performance
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-nf-conntrack=y

          # WiFi (prefer wolfssl)
          CONFIG_PACKAGE_wpad-basic-wolfssl=y
          # CONFIG_PACKAGE_wpad-basic-mbedtls is not set
          EOF

          # Set version string
          echo "CONFIG_VERSION_NUMBER=\"${TAG}\"" >> .config

          make defconfig
          echo "✓ Build configured"
          echo "Target: $(grep CONFIG_TARGET_BOARD .config | head -1)"
          echo "Profile: $(grep CONFIG_TARGET_.*_DEVICE_ .config | grep '=y' | head -1)"

      - name: Verify custom files exist
        run: |
          [ -f "my-configs/x-wrt-customize/banner" ] || {
            echo "ERROR: my-configs/x-wrt-customize/banner not found"
            exit 1
          }
          [ -f "my-configs/x-wrt-customize/luci-banner.js" ] || {
            echo "ERROR: my-configs/x-wrt-customize/luci-banner.js not found"
            exit 1
          }
          echo "✓ Custom files verified"

      - name: Stage custom banner
        run: |
          TAG="${{ github.event.inputs.xwrt_tag }}"

          BASE_VER=$(echo "$TAG" | grep -oP '\d+\.\d+' | head -n1)
          case "$BASE_VER" in
            26.04) CODENAME="Resolute" ;;
            25.04) CODENAME="Resolute" ;;
            24.10) CODENAME="Resolute" ;;
            *)     CODENAME="$BASE_VER" ;;
          esac

          # Stage banner into source tree's files overlay
          mkdir -p xwrt-source/files/etc
          mkdir -p xwrt-source/files/www/luci-static/resources

          sed "s|X-WRT [^,]*, .*|X-WRT ${TAG}, ${CODENAME}|" \
            my-configs/x-wrt-customize/banner > xwrt-source/files/etc/banner

          echo "✓ Staged: /etc/banner"
          cat xwrt-source/files/etc/banner

      - name: Build toolchain
        run: |
          cd xwrt-source
          echo "Building tools..."
          make tools/install -j$(nproc) V=s 2>&1 | tail -2
          echo "Building toolchain..."
          make toolchain/install -j$(nproc) V=s 2>&1 | tail -2
          echo "✓ Toolchain ready"
          df -h .

      - name: Build firmware
        run: |
          cd xwrt-source
          echo "Building firmware..."
          make -j$(nproc) V=s 2>&1 | tee build.log | grep -E "^\s*(make\[|Compiling|Installing|Generating)" | tail -50
          echo ""
          echo "✓ Build complete"
          df -h .

      - name: Patch luci.js with banner injection
        run: |
          cd xwrt-source

          # Find luci-base ipk from the build output
          LUCI_IPK=$(find bin/ -name "luci-base*.ipk" 2>/dev/null | head -n1)

          if [ -n "$LUCI_IPK" ]; then
            echo "Found luci-base ipk: $LUCI_IPK"
            mkdir -p /tmp/luci-extract
            cd /tmp/luci-extract
            # OpenWrt ipk files are ar archives
            ar x "$LUCI_IPK" 2>/dev/null || tar -xzf "$LUCI_IPK" 2>/dev/null
            tar -xzf data.tar.gz 2>/dev/null || tar -xf data.tar.* 2>/dev/null || true
            cd -
            LUCI_JS=$(find /tmp/luci-extract -name "luci.js" | head -n1)
          fi

          if [ -z "$LUCI_JS" ] || [ ! -f "$LUCI_JS" ]; then
            echo "WARNING: Could not extract luci.js — skipping LuCI banner injection"
          else
            echo "✓ luci.js obtained ($(wc -c < "$LUCI_JS") bytes)"

            cp "$LUCI_JS" files/www/luci-static/resources/luci.js
            echo "" >> files/www/luci-static/resources/luci.js
            echo "" >> files/www/luci-static/resources/luci.js
            cat $GITHUB_WORKSPACE/my-configs/x-wrt-customize/luci-banner.js >> files/www/luci-static/resources/luci.js

            echo "✓ Banner injection appended"
            grep -q "BANNER INJECTION" files/www/luci-static/resources/luci.js && \
              echo "✓ Injection marker confirmed" || \
              echo "WARNING: BANNER INJECTION comment not found"

            # Rebuild image with the patched file overlay included
            echo "Rebuilding image with patched luci.js..."
            make target/install -j$(nproc) 2>&1 | tail -3
            make package/index 2>&1 | tail -3
            echo "✓ Rebuild with patched luci.js complete"
          fi

      - name: List build output
        if: always()
        run: |
          echo "=== Build output ==="
          find xwrt-source/bin/targets/ -type f \( -name "*sysupgrade*" -o -name "*factory*" \) 2>/dev/null || echo "No firmware files found"

      - name: Check for build errors
        if: always()
        run: |
          if [ -f xwrt-source/build.log ]; then
            grep -E "^(ERROR|Collected errors)" xwrt-source/build.log | head -20 || echo "No errors found"
          else
            echo "No build log found"
          fi

      - name: Create GitHub Release and upload firmware
        run: |
          TAG="${{ github.event.inputs.xwrt_tag }}"
          BIN=$(find xwrt-source/bin/targets/ramips/mt7621 -name "*sysupgrade.bin" | head -n1)

          [ -z "$BIN" ] && { echo "ERROR: sysupgrade.bin not found"; exit 1; }

          RELEASE_TAG="xwrt-${TAG}-xiaomi-4a"

          gh release create "${RELEASE_TAG}" \
            --title "X-WRT ${TAG} — Xiaomi 4A Gigabit" \
            --notes "**X-WRT ${TAG}** custom build for Xiaomi Mi Router 4A Gigabit

          Packages: PPPoE · WireGuard · ZeroTier · redsocks · dns2socks · luci-app-xwan · luci-app-natflow-users · WoL · HW offload
          Customizations: SSH banner · LuCI login banner (orange)

          Built from source: github.com/x-wrt/x-wrt @ ${TAG}" \
            "${BIN}" || \
            gh release upload "${RELEASE_TAG}" "${BIN}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload firmware as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xwrt-xiaomi-4a-${{ github.event.inputs.xwrt_tag }}
          path: xwrt-source/bin/targets/ramips/mt7621/*sysupgrade.bin
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.event.inputs.xwrt_tag }}
          path: xwrt-source/build.log
          if-no-files-found: warn