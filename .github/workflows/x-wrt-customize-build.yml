name: Build X-WRT for Xiaomi 4A Gigabit
on:
  workflow_dispatch:
    inputs:
      xwrt_tag:
        description: 'X-WRT release tag from github.com/x-wrt/build-release/releases (include the v prefix)'
        required: true
        default: 'v26.04_b202602280042'

permissions:
  contents: write

jobs:
  build:
    name: Compile Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

      - name: Download X-WRT ImageBuilder from GitHub Release
        run: |
          TAG="${{ github.event.inputs.xwrt_tag }}"

          echo "Fetching release asset list for tag ${TAG}..."

          # Use GitHub API to list all assets for this release
          ASSETS=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/x-wrt/build-release/releases/tags/${TAG}")

          # x-wrt releases bundle everything in zip files per target/device.
          # The ImageBuilder .tar.xz is INSIDE the zip, not a standalone asset.
          #
          # New releases (v26+): per-device zips like x-wrt-ramips-mt7621-apps.zip
          #   The "-apps.zip" contains the ImageBuilder + packages
          # Old releases (v23): per-target zips like x-wrt-23.10_b...-ramips-mt7621.zip
          #   The full target zip contains everything including ImageBuilder
          ASSET_URL=$(echo "$ASSETS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = data.get('assets', [])

          # Priority 1: look for ramips-mt7621 apps zip (new format, smaller, has ImageBuilder)
          for a in assets:
              name = a['name'].lower()
              if 'ramips-mt7621' in name and 'apps' in name and name.endswith('.zip'):
                  print(a['browser_download_url'])
                  sys.exit(0)

          # Priority 2: look for ramips-mt7621 target zip (old format, large but has everything)
          #   Exclude ext4fs and nosymbol variants
          for a in assets:
              name = a['name'].lower()
              if 'ramips-mt7621' in name and name.endswith('.zip'):
                  if 'ext4fs' not in name and 'nosymbol' not in name:
                      print(a['browser_download_url'])
                      sys.exit(0)

          # Priority 3: any ramips-mt7621 zip at all
          for a in assets:
              name = a['name'].lower()
              if 'ramips-mt7621' in name and name.endswith('.zip'):
                  print(a['browser_download_url'])
                  sys.exit(0)
          ")

          if [ -z "$ASSET_URL" ]; then
            echo "ERROR: Could not find ramips-mt7621 zip in release ${TAG}"
            echo "Available ramips assets:"
            echo "$ASSETS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              if 'ramips' in a['name'].lower():
                  print('  ', a['name'])
          " || echo "  (no ramips assets found)"
            echo ""
            echo "All assets:"
            echo "$ASSETS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('assets', []):
              print('  ', a['name'])
          " | head -30
            echo "Check release at: https://github.com/x-wrt/build-release/releases/tag/${TAG}"
            exit 1
          fi

          echo "Found target zip: $ASSET_URL"
          wget "$ASSET_URL" -O target.zip

          echo "Extracting zip..."
          mkdir -p /tmp/xwrt-extract
          unzip -q target.zip -d /tmp/xwrt-extract

          echo "Looking for ImageBuilder tarball inside zip..."
          IB_TAR=$(find /tmp/xwrt-extract -name "*imagebuilder*ramips*mt7621*.tar.xz" -o -name "*imagebuilder*.tar.xz" 2>/dev/null | head -n1)

          if [ -z "$IB_TAR" ]; then
            echo "Contents of extracted zip:"
            find /tmp/xwrt-extract -type f | head -50
            echo ""
            echo "ERROR: No ImageBuilder tarball found inside the zip"
            echo "This release may not include an ImageBuilder for ramips-mt7621"
            exit 1
          fi

          echo "Found ImageBuilder tarball: $IB_TAR"
          tar -Jxf "$IB_TAR"
          mv x-wrt-imagebuilder-* imagebuilder 2>/dev/null || \
            mv *imagebuilder* imagebuilder 2>/dev/null
          echo "✓ ImageBuilder ready"
          ls -la imagebuilder/

      - name: Verify custom files exist in repo
        run: |
          [ -f "my-configs/x-wrt-customize/banner" ] || {
            echo "ERROR: my-configs/x-wrt-customize/banner not found"
            exit 1
          }
          [ -f "my-configs/x-wrt-customize/luci-banner.js" ] || {
            echo "ERROR: my-configs/x-wrt-customize/luci-banner.js not found"
            exit 1
          }
          echo "✓ banner found"
          echo "✓ luci-banner.js found"

      - name: Fetch X-WRT luci.js and append banner injection
        run: |
          TAG="${{ github.event.inputs.xwrt_tag }}"

          # luci-base ipk is in the ImageBuilder's packages directory
          # which was extracted in the previous step — no network fetch needed
          LUCI_IPK=$(find imagebuilder/packages -name "luci-base*.ipk" 2>/dev/null | head -n1)

          if [ -n "$LUCI_IPK" ]; then
            echo "Found luci-base ipk: $LUCI_IPK"
            mkdir -p /tmp/luci-extract
            cd /tmp/luci-extract
            tar -xzf "$LUCI_IPK"
            tar -xzf data.tar.gz ./www/luci-static/resources/luci.js 2>/dev/null || \
              tar -xzf data.tar.gz
            cd -
            LUCI_JS=$(find /tmp/luci-extract -name "luci.js" | head -n1)
          fi

          if [ -z "$LUCI_JS" ] || [ ! -f "$LUCI_JS" ]; then
            echo "WARNING: Could not find luci-base ipk in ImageBuilder packages"
            echo "Trying package index feed..."

            # Fallback: fetch from X-WRT package feed via GitHub release assets
            # The packages feed URL is embedded in the ImageBuilder's repositories.conf
            REPO_URL=$(grep "x-wrt\|xwrt" imagebuilder/repositories.conf 2>/dev/null \
              | grep "^src/gz" | awk '{print $3}' | head -n1)

            if [ -n "$REPO_URL" ]; then
              wget -q "${REPO_URL}/Packages" -O /tmp/pkg-index || true
              LUCI_IPK_NAME=$(grep -A5 "^Package: luci-base$" /tmp/pkg-index \
                | grep "^Filename:" | awk '{print $2}')
              if [ -n "$LUCI_IPK_NAME" ]; then
                wget -q "${REPO_URL}/${LUCI_IPK_NAME}" -O /tmp/luci-base.ipk || true
                mkdir -p /tmp/luci-extract2
                cd /tmp/luci-extract2
                tar -xzf /tmp/luci-base.ipk
                tar -xzf data.tar.gz 2>/dev/null || true
                cd -
                LUCI_JS=$(find /tmp/luci-extract2 -name "luci.js" | head -n1)
              fi
            fi
          fi

          if [ -z "$LUCI_JS" ] || [ ! -f "$LUCI_JS" ]; then
            echo "ERROR: Could not obtain luci.js for ${TAG}"
            exit 1
          fi

          echo "✓ luci.js obtained ($(wc -c < "$LUCI_JS") bytes)"

          cp "$LUCI_JS" /tmp/luci-patched.js
          echo "" >> /tmp/luci-patched.js
          echo "" >> /tmp/luci-patched.js
          cat my-configs/x-wrt-customize/luci-banner.js >> /tmp/luci-patched.js

          echo "✓ Banner injection appended"
          grep -q "BANNER INJECTION" /tmp/luci-patched.js && \
            echo "✓ Injection confirmed" || \
            echo "WARNING: BANNER INJECTION comment not found"

      - name: Stage custom files for ImageBuilder
        run: |
          TAG="${{ github.event.inputs.xwrt_tag }}"
          mkdir -p imagebuilder/files/etc
          mkdir -p imagebuilder/files/www/luci-static/resources

          BASE_VER=$(echo "$TAG" | grep -oP '\d+\.\d+' | head -n1)
          case "$BASE_VER" in
            26.04) CODENAME="Resolute" ;;
            25.04) CODENAME="Resolute" ;;
            24.10) CODENAME="Resolute" ;;
            *)     CODENAME="$BASE_VER" ;;
          esac

          # Strip leading 'v' from tag for display in banner
          DISPLAY_TAG="${TAG#v}"

          sed "s|X-WRT [^,]*, .*|X-WRT ${DISPLAY_TAG}, ${CODENAME}|" \
            my-configs/x-wrt-customize/banner > imagebuilder/files/etc/banner

          echo "✓ Staged: /etc/banner"
          echo "--- Banner preview ---"
          cat imagebuilder/files/etc/banner
          echo "--- End banner ---"

          cp /tmp/luci-patched.js \
             imagebuilder/files/www/luci-static/resources/luci.js
          echo "✓ Staged: /www/luci-static/resources/luci.js"

      - name: Build ROM
        run: |
          cd imagebuilder
          PACKAGES="
            luci
            luci-ssl
            ppp
            ppp-mod-pppoe
            luci-proto-wireguard
            kmod-wireguard
            wireguard-tools
            zerotier
            luci-app-zerotier
            luci-app-wol
            etherwake
            redsocks
            dns2socks
            luci-app-commands
            luci-app-xwan
            luci-app-natflow-users
            kmod-nft-nat
            kmod-nft-offload
            kmod-nf-conntrack
            -wpad-basic-mbedtls
            wpad-basic-wolfssl
          "
          make image \
            PROFILE="xiaomi_mi-router-4a-gigabit" \
            PACKAGES="$(echo $PACKAGES)" \
            FILES="files/" \
            2>&1 | tee build.log

      - name: Check for build errors
        if: always()
        run: grep -E "^(ERROR|Collected errors)" imagebuilder/build.log || echo "No errors found"

      - name: Create GitHub Release and upload firmware
        run: |
          TAG="${{ github.event.inputs.xwrt_tag }}"
          DISPLAY_TAG="${TAG#v}"
          BIN=$(find imagebuilder/bin/targets/ramips/mt7621 -name "*sysupgrade.bin" | head -n1)

          [ -z "$BIN" ] && { echo "ERROR: sysupgrade.bin not found"; exit 1; }

          RELEASE_TAG="xwrt-${DISPLAY_TAG}-xiaomi-4a"

          gh release create "${RELEASE_TAG}" \
            --title "X-WRT ${DISPLAY_TAG} — Xiaomi 4A Gigabit" \
            --notes "**X-WRT ${DISPLAY_TAG}** custom build for Xiaomi Mi Router 4A Gigabit

          Packages: PPPoE · WireGuard · ZeroTier · redsocks · dns2socks · luci-app-xwan · luci-app-natflow-users · WoL · HW offload
          Customizations: SSH banner · LuCI login banner (orange)" \
            "${BIN}" \
            imagebuilder/build.log || \
            gh release upload "${RELEASE_TAG}" "${BIN}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload firmware as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: xwrt-xiaomi-4a-${{ github.event.inputs.xwrt_tag }}
          path: imagebuilder/bin/targets/ramips/mt7621/*sysupgrade.bin

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.event.inputs.xwrt_tag }}
          path: imagebuilder/build.log