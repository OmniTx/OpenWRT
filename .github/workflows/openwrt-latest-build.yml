name: Build OpenWrt for Xiaomi 4A Gigabit
on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version (e.g. 23.05.5) or "latest"'
        required: true
        default: 'latest'
      patch_luci:
        description: 'Inject custom LuCI login banner (luci-banner.js)'
        required: false
        type: boolean
        default: true
  schedule:
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  build:
    name: Compile Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 zstd

      - name: Resolve OpenWrt Version
        id: openwrt_version
        run: |
          INPUT_VERSION="${{ github.event.inputs.openwrt_version }}"
          
          # If triggered by schedule, INPUT_VERSION will be empty, so we default to "latest" safely
          if [ -z "$INPUT_VERSION" ] || [ "$INPUT_VERSION" = "latest" ]; then
            echo "Detecting latest OpenWrt version (including RC)..."
            # Get all version numbers (stable + RC), sorted newest-first
            VERSIONS=$(wget -qO- https://downloads.openwrt.org/releases/ \
              | grep -oP '(?<=href=")[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?(?=/)' \
              | sort -Vru)

            if [ -z "$VERSIONS" ]; then
              echo "ERROR: Could not detect any OpenWrt stable versions"
              exit 1
            fi

            # Pick the newest version that actually has an ImageBuilder available
            # We scrape the directory listing instead of guessing the filename,
            # because 23.05.x uses .tar.xz while 24.10.x+ uses .tar.zst
            LATEST=""
            for VER in $VERSIONS; do
              DIR_URL="https://downloads.openwrt.org/releases/${VER}/targets/ramips/mt7621/"
              echo "Checking ${VER}..."
              IB_FILE=$(wget -qO- "$DIR_URL" \
                | grep -oP 'openwrt-imagebuilder-[^"]+\.tar\.(xz|zst)' | head -n1)
              if [ -n "$IB_FILE" ]; then
                LATEST="$VER"
                echo "✓ ImageBuilder available for ${VER}: ${IB_FILE}"
                break
              else
                echo "  ✗ ImageBuilder not found for ${VER}, trying older..."
              fi
            done

            if [ -z "$LATEST" ]; then
              echo "ERROR: No OpenWrt stable version has an available ImageBuilder"
              exit 1
            fi

            echo "Latest stable OpenWrt (verified): ${LATEST}"
            echo "version=${LATEST}" >> $GITHUB_OUTPUT
          else
            echo "Using specified OpenWrt version: ${INPUT_VERSION}"
            echo "version=${INPUT_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Download OpenWrt ImageBuilder
        run: |
          VERSION="${{ steps.openwrt_version.outputs.version }}"
          BASE_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/ramips/mt7621"

          # Discover the actual ImageBuilder filename (handles .tar.xz and .tar.zst)
          TARBALL=$(wget -qO- "${BASE_URL}/" \
            | grep -oP 'openwrt-imagebuilder-[^"]+\.tar\.(xz|zst)' | head -n1)

          if [ -z "$TARBALL" ]; then
            echo "ERROR: Could not find ImageBuilder tarball for version ${VERSION}"
            exit 1
          fi

          echo "Downloading: ${TARBALL}"
          wget "${BASE_URL}/${TARBALL}" || {
            echo "ERROR: Could not fetch ImageBuilder for version ${VERSION}"
            exit 1
          }

          # Extract — auto-detect compression (works with both xz and zst)
          case "$TARBALL" in
            *.tar.zst) zstd -d "${TARBALL}" --stdout | tar -xf - ;;
            *.tar.xz)  tar -Jxf "${TARBALL}" ;;
            *)         tar -axf "${TARBALL}" ;;
          esac
          rm "${TARBALL}"
          mv openwrt-imagebuilder-* imagebuilder
          echo "✓ ImageBuilder ready"

      - name: Verify custom files exist in repo
        run: |
          [ -f "my-configs/x-wrt-customize/banner" ] || {
            echo "ERROR: my-configs/x-wrt-customize/banner not found"
            exit 1
          }
          echo "✓ banner found"

          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.patch_luci }}" = "true" ] || [ -z "${{ github.event.inputs.patch_luci }}" ]; then
            [ -f "my-configs/x-wrt-customize/luci-banner.js" ] || {
              echo "ERROR: my-configs/x-wrt-customize/luci-banner.js not found"
              exit 1
            }
            echo "✓ luci-banner.js found"
          fi

      - name: Patch banner injection color for OpenWrt
        if: ${{ github.event_name == 'schedule' || github.event.inputs.patch_luci == 'true' || github.event.inputs.patch_luci == '' }}
        run: |
          # Repo file uses X-WRT orange #F37320 as base
          # OpenWrt build swaps to official OpenWrt blue #4a9de0 at build time
          # X-WRT workflow reads the file directly — untouched
          sed 's/#F37320/#4a9de0/g' \
            my-configs/x-wrt-customize/luci-banner.js > /tmp/luci-banner-patched.js

          echo "✓ Color patched: #F37320 → #4a9de0"
          grep "color" /tmp/luci-banner-patched.js

      - name: Fetch OpenWrt luci.js and append banner injection
        if: ${{ github.event_name == 'schedule' || github.event.inputs.patch_luci == 'true' || github.event.inputs.patch_luci == '' }}
        continue-on-error: true
        run: |
          VERSION="${{ steps.openwrt_version.outputs.version }}"

          # Try target packages first, then the luci feed
          PKG_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/ramips/mt7621/packages"
          LUCI_FEED="https://downloads.openwrt.org/releases/${VERSION}/packages/mipsel_24kc/luci"

          echo "Fetching package index..."
          wget -q "${PKG_URL}/Packages" -O /tmp/pkg-index || \
            wget -q "${LUCI_FEED}/Packages" -O /tmp/pkg-index

          LUCI_IPK=$(grep -A5 "^Package: luci-base$" /tmp/pkg-index \
            | grep "^Filename:" | awk '{print $2}')

          if [ -n "$LUCI_IPK" ]; then
            echo "Found luci-base ipk: $LUCI_IPK"
            wget -q "${PKG_URL}/${LUCI_IPK}" -O /tmp/luci-base.ipk || \
              wget -q "${LUCI_FEED}/${LUCI_IPK}" -O /tmp/luci-base.ipk

            mkdir -p /tmp/luci-extract
            cd /tmp/luci-extract
            
            EXTRACTED=false
            if command -v ar >/dev/null 2>&1; then
              ar x /tmp/luci-base.ipk 2>/dev/null && EXTRACTED=true
            fi
            if [ "$EXTRACTED" = false ]; then
              tar -xzf /tmp/luci-base.ipk 2>/dev/null && EXTRACTED=true
            fi
            if [ "$EXTRACTED" = false ]; then
              tar --zstd -xf /tmp/luci-base.ipk 2>/dev/null && EXTRACTED=true
            fi

            tar -xzf data.tar.gz 2>/dev/null || tar -xf data.tar.* 2>/dev/null || true
            cd -

            LUCI_JS=$(find /tmp/luci-extract -name "luci.js" | head -n1)
          fi

          if [ -z "$LUCI_JS" ] || [ ! -f "$LUCI_JS" ]; then
            echo "WARNING: Could not extract from ipk — falling back to direct fetch"
            wget -q "${PKG_URL}/luci.js" -O /tmp/luci.js 2>/dev/null || true
            [ -s /tmp/luci.js ] || {
              echo "ERROR: Could not obtain luci.js for OpenWrt ${VERSION}"
              exit 1
            }
            LUCI_JS="/tmp/luci.js"
          fi

          echo "✓ OpenWrt luci.js obtained ($(wc -c < "$LUCI_JS") bytes)"

          # Append blue-colored banner injection
          cp "$LUCI_JS" /tmp/luci-patched.js
          echo "" >> /tmp/luci-patched.js
          echo "" >> /tmp/luci-patched.js
          cat /tmp/luci-banner-patched.js >> /tmp/luci-patched.js

          echo "✓ Banner injection appended"
          echo "Final luci.js size: $(wc -c < /tmp/luci-patched.js) bytes"

          grep -q "BANNER INJECTION" /tmp/luci-patched.js && \
            echo "✓ Injection confirmed" || \
            echo "WARNING: BANNER INJECTION comment not found"

      - name: Stage custom files for ImageBuilder
        run: |
          VERSION="${{ steps.openwrt_version.outputs.version }}"
          mkdir -p imagebuilder/files/etc
          mkdir -p imagebuilder/files/www/luci-static/resources

          # Map version to OpenWrt codename
          BASE_VER=$(echo "$VERSION" | grep -oP '^\d+\.\d+')
          case "$BASE_VER" in
            23.05) CODENAME="Reef" ;;
            24.10) CODENAME="Snapshot" ;;
            22.03) CODENAME="Firehorse" ;;
            21.02) CODENAME="Impala" ;;
            *)     CODENAME="Stable" ;;
          esac

          # Replace X-WRT version line with OpenWrt version
          sed "s|X-WRT [^,]*, .*|OpenWrt ${VERSION}, ${CODENAME}|" \
            my-configs/x-wrt-customize/banner > imagebuilder/files/etc/banner

          echo "✓ Staged: /etc/banner"
          echo "--- Banner preview ---"
          cat imagebuilder/files/etc/banner
          echo "--- End banner ---"

          if [ -f /tmp/luci-patched.js ]; then
            cp /tmp/luci-patched.js \
               imagebuilder/files/www/luci-static/resources/luci.js
            echo "✓ Staged: /www/luci-static/resources/luci.js"
          fi

          echo "All staged files:"
          find imagebuilder/files -type f -ls

      - name: Build dns2socks from source (OpenWrt SDK)
        run: |
          VERSION="${{ steps.openwrt_version.outputs.version }}"
          SDK_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/ramips/mt7621"

          # Discover the actual SDK filename (handles .tar.xz and .tar.zst, any GCC version)
          SDK_TAR=$(wget -qO- "${SDK_URL}/" \
            | grep -oP 'openwrt-sdk-[^"]+\.tar\.(xz|zst)' | head -n1)

          if [ -z "$SDK_TAR" ]; then
            echo "ERROR: Could not find SDK tarball for ${VERSION}"
            exit 1
          fi

          echo "Downloading OpenWrt SDK: ${SDK_TAR}"
          wget -q "${SDK_URL}/${SDK_TAR}" || {
            echo "ERROR: Could not download SDK for ${VERSION}"
            exit 1
          }

          # Extract — auto-detect compression (works with both xz and zst)
          case "$SDK_TAR" in
            *.tar.zst) zstd -d "${SDK_TAR}" --stdout | tar -xf - ;;
            *.tar.xz)  tar -Jxf "${SDK_TAR}" ;;
            *)         tar -axf "${SDK_TAR}" ;;
          esac
          rm "${SDK_TAR}"
          mv openwrt-sdk-* sdk

          # Clone dns2socks OpenWrt package recipe
          git clone --depth 1 https://github.com/kongfl888/openwrt-dns2socks.git \
            sdk/package/dns2socks

          # Clone luci-app-zerotier OpenWrt package recipe (fw4 compatible for OpenWrt 22.03+)
          git clone --depth 1 https://github.com/zhengmz/luci-app-zerotier.git \
            sdk/package/luci-app-zerotier

          cd sdk
          # Update feeds and install dependencies
          ./scripts/feeds update -a 2>&1 | tail -3
          ./scripts/feeds install -a 2>&1 | tail -3

          # Build packages
          make defconfig 2>&1 | tail -3
          echo "Compiling dns2socks..."
          make package/dns2socks/compile V=s -j$(nproc) 2>&1 | tail -20
          echo "Compiling luci-app-zerotier..."
          make package/luci-app-zerotier/compile V=s -j$(nproc) 2>&1 | tail -20

          # Find and copy the built packages into ImageBuilder's packages dir
          DNS2SOCKS_PKG=$(find bin/ -type f \( -name "dns2socks*.ipk" -o -name "dns2socks*.apk" \) | head -n1)
          ZEROTIER_PKG=$(find bin/ -type f \( -name "luci-app-zerotier*.ipk" -o -name "luci-app-zerotier*.apk" \) | head -n1)

          if [ -z "$DNS2SOCKS_PKG" ]; then
            echo "ERROR: dns2socks package not found after SDK build"
            exit 1
          fi
          if [ -z "$ZEROTIER_PKG" ]; then
            echo "ERROR: luci-app-zerotier package not found after SDK build"
            exit 1
          fi

          echo "✓ dns2socks compiled: $DNS2SOCKS_PKG"
          echo "✓ luci-app-zerotier compiled: $ZEROTIER_PKG"
          cp "$DNS2SOCKS_PKG" "$GITHUB_WORKSPACE/imagebuilder/packages/"
          cp "$ZEROTIER_PKG" "$GITHUB_WORKSPACE/imagebuilder/packages/"
          # Regenerate the local packages index so opkg can discover dns2socks
          cd "$GITHUB_WORKSPACE/imagebuilder"
          echo "Building package index using ImageBuilder..."
          make package_index || {
            echo "WARNING: make package_index failed. Generating minimal Packages index manually..."
            cd packages
            for ipk in *.ipk; do
              [ -f "$ipk" ] || continue
              # Support both gz and zst compressions used by OpenWrt
              tar -xO -f "$ipk" ./control.tar.gz 2>/dev/null | tar -xzO ./control > control.tmp 2>/dev/null || \
              tar -xO -f "$ipk" ./control.tar.zst 2>/dev/null | tar -xO --zstd ./control > control.tmp 2>/dev/null || true
              cat control.tmp >> Packages 2>/dev/null || echo "Package: $(echo "$ipk" | sed 's/_.*//')" >> Packages
              echo "Filename: $ipk" >> Packages
              echo "Size: $(stat -c %s "$ipk")" >> Packages
              echo "SHA256sum: $(sha256sum "$ipk" | awk '{print $1}')" >> Packages
              echo "" >> Packages
              rm -f control.tmp
            done
            gzip -kf Packages
          }
          ls -la "$GITHUB_WORKSPACE/imagebuilder/packages/"
          cd "$GITHUB_WORKSPACE"

      - name: Configure ImageBuilder package feeds
        run: |
          cd imagebuilder
          if [ -f "repositories.conf" ]; then
            # OPKG-based (OpenWrt <= 23.05)
            # Ensure all official package feeds are enabled (uncomment if commented)
            sed -i 's/^# \(src\/gz openwrt_\)/\1/' repositories.conf
            # Disable signature checking so local ipks (dns2socks) can be installed
            sed -i 's/^option check_signature/# option check_signature/' repositories.conf
            echo "✓ Package feeds configured (OPKG)"
            echo "--- repositories.conf ---"
            cat repositories.conf
            echo "--- Packages index content ---"
            cat packages/Packages || echo "WARNING: No Packages index found"
          else
            # APK-based (OpenWrt >= 24.10)
            echo "✓ OpenWrt >= 24.10 detected (APK instead of OPKG)."
            echo "✓ Local packages are managed dynamically without repositories.conf."
          fi
          echo "--- Local packages list ---"
          find packages/ -type f -ls

      - name: Build ROM
        run: |
          cd imagebuilder
          PACKAGES="
            luci
            luci-ssl
            ppp
            ppp-mod-pppoe
            luci-proto-wireguard
            kmod-wireguard
            wireguard-tools
            zerotier
            luci-app-zerotier
            luci-app-wol
            etherwake
            redsocks
            dns2socks
            luci-app-commands
            kmod-nft-nat
            kmod-nft-offload
            kmod-nf-conntrack
            -wpad-basic-mbedtls
            wpad-basic-wolfssl
          "
          make image \
            PROFILE="xiaomi_mi-router-4a-gigabit" \
            PACKAGES="$(echo $PACKAGES)" \
            FILES="files/" \
            2>&1 | tee build.log

      - name: Check for build errors
        if: always()
        run: |
          VERSION="${{ steps.openwrt_version.outputs.version }}"
          echo "Built OpenWrt version: ${VERSION}"
          echo "=== opkg errors ==="
          grep -iE "(Unknown package|Cannot install|satisfy|Collected errors|opkg_install)" imagebuilder/build.log || echo "No opkg errors found"
          echo "=== make errors ==="
          grep -E "^(ERROR|make\[)" imagebuilder/build.log | tail -20 || echo "No make errors found"

      - name: Create GitHub Release and upload firmware
        if: always()
        run: |
          VERSION="${{ steps.openwrt_version.outputs.version }}"
          BIN=$(find imagebuilder/bin/targets/ramips/mt7621 -name "*sysupgrade.bin" | head -n1)

          if [ -z "$BIN" ]; then
            echo "ERROR: sysupgrade.bin not found — build likely failed"
            exit 1
          fi

          # Give the binary a unique timestamp to prevent clobbering
          TIMESTAMP=$(date +'%Y%m%d-%H%M')
          UNIQUE_BIN="$(dirname "$BIN")/openwrt-${VERSION}-xiaomi-4a-${TIMESTAMP}-sysupgrade.bin"
          mv "$BIN" "$UNIQUE_BIN"

          # Tag format: openwrt-23.05.5-xiaomi-4a
          TAG="openwrt-${VERSION}-xiaomi-4a"

          # Create the release and upload the bin in one gh command
          gh release create "${TAG}" \
            --title "OpenWrt ${VERSION} — Xiaomi 4A Gigabit" \
            --notes "**OpenWrt ${VERSION}** custom build for Xiaomi Mi Router 4A Gigabit

          **Packages included:**
          - PPPoE WAN
          - WireGuard + LuCI proto
          - ZeroTier
          - redsocks + dns2socks
          - luci-app-wol + etherwake
          - luci-app-commands
          - Hardware flow offloading (kmod-nft-offload)

          **Customizations:**
          - Custom SSH banner
          - LuCI login banner (OpenWrt blue)

          Built automatically from latest stable OpenWrt." \
            "${UNIQUE_BIN}" \
            imagebuilder/build.log || {
              # Release may already exist if same version built twice
              echo "WARNING: Release ${TAG} may already exist — uploading asset only"
              gh release upload "${TAG}" "${UNIQUE_BIN}"
            }

          echo "✓ Release created: ${TAG}"
          echo "URL: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload firmware as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-xiaomi-4a-${{ steps.openwrt_version.outputs.version }}
          path: imagebuilder/bin/targets/ramips/mt7621/*sysupgrade.bin
          if-no-files-found: warn

      - name: Upload build log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-openwrt-${{ steps.openwrt_version.outputs.version }}
          path: imagebuilder/build.log